<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>家族パネル・リモコン</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    /* iPhone 6でも見やすく、押しやすいデザイン */
    body { 
      margin: 0; 
      background-color: #f0f0f0; 
      font-family: "Hiragino Sans", sans-serif; 
      display: flex; 
      flex-direction: column; 
      align-items: center;
      padding: 20px;
    }

    h1 { font-size: 1.2rem; color: #333; margin-bottom: 20px; }

    /* 現在の状態を表示するランプ */
    #status-display {
      width: 90%;
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }
    #status-text { font-weight: bold; color: #ce0000; font-size: 1.2rem; }

    /* ボタンのレイアウト */
    .admin-area { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 15px; 
      width: 100%;
      max-width: 400px;
    }

    button { 
      padding: 25px 10px; 
      font-size: 1.2rem; 
      font-weight: bold; 
      border: none; 
      border-radius: 15px; 
      color: white; 
      cursor: pointer;
      box-shadow: 0 4px #999;
      transition: 0.1s;
    }

    button:active {
      box-shadow: 0 0 #999;
      transform: translateY(4px);
    }

    /* 各ボタンの色 */
    .btn-gohan { background-color: #4CAF50; }
    .btn-ofuro { background-color: #2196F3; }
    .btn-reset { background-color: #888; grid-column: 1 / 3; margin-top: 20px; }

    .camera-placeholder {
      margin-top: 40px;
      width: 100%;
      height: 150px;
      background: #ddd;
      border: 2px dashed #999;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      color: #777;
    }
  </style>
</head>
<body>

  <h1>家族パネル操作</h1>

  <div id="status-display">
    現在の表示: <span id="status-text">読み込み中...</span>
  </div>

  <div id="admin" class="admin-area">
    <button class="btn-gohan" onclick="updateDb('ごはん')">ごはん</button>
    <button class="btn-ofuro" onclick="updateDb('お風呂')">お風呂</button>
    <button class="btn-reset" onclick="updateDb('通常')">通常（時計）に戻す</button>
  </div>

  <div class="camera-placeholder">
    📸 カメラ確認機能（明日実装予定）
  </div>

  <script>
    // 子機と同じFirebase設定を使用
    const firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('currentStatus');

    // データを送る関数
    function updateDb(status) {
      db.set({ mode: status, time: Date.now() });
    }

    // 今、子機が何を表示しているかをリアルタイムで確認
    db.on('value', (snap) => {
      const data = snap.val();
      if (!data) return;
      
      const statusText = document.getElementById('status-text');
      statusText.innerText = data.mode;
      
      // 状態に合わせて文字色を変える
      if(data.mode === 'ごはん') statusText.style.color = "#4CAF50";
      else if(data.mode === 'お風呂') statusText.style.color = "#2196F3";
      else statusText.style.color = "#888";
    });
  </script>
</body>
</html>
