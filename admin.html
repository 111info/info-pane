<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>家族パネル・リモコン</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    /* iPhone 6でも操作しやすい専用デザイン */
    body { 
      margin: 0; 
      background-color: #f0f0f0; 
      font-family: "Hiragino Sans", sans-serif; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      padding: 20px; 
    }

    h1 { font-size: 1.2rem; color: #333; margin-bottom: 15px; }

    /* 現在子機に何が出ているかを表示するパネル */
    #status-display { 
      width: 90%; 
      background: white; 
      padding: 15px; 
      border-radius: 12px; 
      text-align: center; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
      margin-bottom: 25px; 
    }
    
    #status-label { font-size: 14px; color: #666; margin-bottom: 5px; }
    #status-text { font-weight: bold; font-size: 1.4rem; color: #333; }

    /* ボタンの配置（2列のグリッド） */
    .grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 15px; 
      width: 100%; 
      max-width: 400px; 
    }

    button { 
      padding: 25px 10px; 
      font-size: 1.2rem; 
      font-weight: bold; 
      border: none; 
      border-radius: 15px; 
      color: white; 
      box-shadow: 0 4px #999; 
      cursor: pointer;
      transition: 0.1s;
    }

    /* ボタンを押した時の動き */
    button:active { 
      box-shadow: 0 0 #999; 
      transform: translateY(4px); 
    }

    /* ボタンの色設定 */
    .btn-gohan { background-color: #ce0000; } /* 子機の赤色に合わせました */
    .btn-ofuro { background-color: #2196F3; } /* 子機の青色に合わせました */
    .btn-reset { 
      background-color: #888; 
      grid-column: 1 / 3; 
      margin-top: 10px; 
      font-size: 1rem;
    }

    /* 明日のカメラ機能用スペース */
    #camera-area {
      margin-top: 30px;
      width: 100%;
      padding: 20px;
      border: 2px dashed #bbb;
      border-radius: 15px;
      color: #888;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>操作リモコン</h1>

  <div id="status-display">
    <div id="status-label">現在の表示</div>
    <div id="status-text">確認中...</div>
  </div>

  <div class="grid">
    <button class="btn-gohan" onclick="updateDb('ごはん')">ごはん</button>
    <button class="btn-ofuro" onclick="updateDb('お風呂')">お風呂</button>
    <button class="btn-reset" onclick="updateDb('通常')">時計に戻す</button>
  </div>

  <div id="camera-area">
    📸 カメラ機能（明日実装予定）
  </div>

  <script>
    // Firebase設定
    const firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('currentStatus');

    // 子機にデータを送る関数
    function updateDb(status) {
      db.set({ mode: status, time: Date.now() });
    }

    // 子機の今の状態をリアルタイムに受け取って表示を変える
    db.on('value', (snap) => {
      const data = snap.val();
      const statusText = document.getElementById('status-text');
      
      if (data) {
        statusText.innerText = data.mode;
        
        // 状態に合わせて文字色を変える
        if (data.mode === 'ごはん') statusText.style.color = "#ce0000";
        else if (data.mode === 'お風呂') statusText.style.color = "#2196F3";
        else statusText.style.color = "#333";
      }
    });
  </script>
</body>
</html>
