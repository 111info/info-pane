<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>家族パネル・子機</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { 
      margin: 0; 
      background-color: #eaddca; 
      color: #3e2723; 
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif; 
      transition: 0.5s; 
      overflow: hidden;
    }

    #container {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      padding: 30px; /* 全体的な余白 */
      box-sizing: border-box;
    }

    /* 上側：お知らせ通知エリア（少し小さめに調整） */
    #notice-section {
      flex: 0 0 45%; /* 全体の45%に縮小 */
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #message-card { 
      width: 90%; /* iPadサイズに合わせて幅を少し絞る */
      height: 80%;
      background: rgba(255, 255, 255, 0.95); 
      border-radius: 40px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 25px;
      box-sizing: border-box;
      border: 3px solid #d7ccc8;
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .show-msg #message-card { 
      opacity: 1;
      transform: translateY(0);
    }

    #message { 
      font-size: 7vw; /* 文字サイズも微調整 */
      font-weight: 900; 
      text-align: center; 
      line-height: 1.3;
      color: #212121;
    }

    /* 下側：時計エリア（枠なし・土壁に直接表示） */
    #clock-section {
      flex: 0 0 55%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      /* 枠(background/border)を削除しました */
    }

    #info-date { 
      font-size: 4vw; 
      font-weight: bold; 
      color: #795548;
      margin-bottom: 5px;
      letter-spacing: 0.1em;
    }

    #clock { 
      font-size: 20vw; /* 枠がない分、数字を際立たせる */
      font-weight: 900; 
      line-height: 1;
      color: #4e342e;
      text-shadow: 1px 1px 0px rgba(255,255,255,0.3); /* 土壁で見やすく */
    }

    /* 状態別カラー */
    .alert-gohan #message-card { background: #fff8f8; border-color: #ff8a80; }
    .alert-gohan #message { color: #d32f2f; }
    .alert-ofuro #message-card { background: #f0f8ff; border-color: #82b1ff; }
    .alert-ofuro #message { color: #1976d2; }

    /* 夜間モード */
    .night-mode { background-color: #000 !important; }
    .night-mode #container { display: none; }
    #localVideo { position: fixed; width: 1px; height: 1px; opacity: 0; }
  </style>
</head>
<body onclick="userActive()">
  <div id="container">
    <div id="notice-section">
      <div id="message-card">
        <div id="message">おしらせ</div>
      </div>
    </div>
    <div id="clock-section">
      <div id="info-date">0月0日 (曜)</div>
      <div id="clock">00:00</div>
    </div>
  </div>
  
  <video id="localVideo" autoplay playsinline muted></video>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    var db = firebase.database();
    var lastMsg = "";

    function updateClock() {
      if (document.body.classList.contains('night-mode')) return;
      var now = new Date();
      var m = now.getMonth() + 1;
      var d = now.getDate();
      var dayList = ["日", "月", "火", "水", "木", "金", "土"];
      var day = dayList[now.getDay()];
      document.getElementById('info-date').innerText = m + "月" + d + "日 (" + day + ")";
      document.getElementById('clock').innerText = now.getHours() + ":" + ("0" + now.getMinutes()).slice(-2);
    }
    setInterval(updateClock, 1000);
    updateClock();

    function say(txt) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      var uttr = new SpeechSynthesisUtterance(txt);
      uttr.lang = "ja-JP";
      uttr.rate = 0.85; 
      window.speechSynthesis.speak(uttr);
    }

    function keepAudioAlive() {
      var uttr = new SpeechSynthesisUtterance("");
      uttr.volume = 0;
      window.speechSynthesis.speak(uttr);
    }

    db.ref('currentStatus').on('value', function(snap) {
      var data = snap.val();
      if (!data) return;
      var body = document.body;
      var h = new Date().getHours();
      
      if (data.nightMode == 1 || (data.nightMode == 0 && (h >= 21 || h < 7))) {
        body.classList.add('night-mode');
      } else {
        body.classList.remove('night-mode');
      }

      body.classList.remove('alert-gohan', 'alert-ofuro', 'show-msg');
      var displayMsg = "";
      
      if (data.mode === 'ごはん') {
        body.classList.add('alert-gohan', 'show-msg');
        displayMsg = "ごはんです";
      } else if (data.mode === 'お風呂') {
        body.classList.add('alert-ofuro', 'show-msg');
        displayMsg = "お風呂です";
      } else if (data.mode !== "通常" && data.mode !== "") {
        body.classList.add('show-msg');
        displayMsg = data.mode;
      }

      document.getElementById('message').innerText = displayMsg;

      if (!body.classList.contains('night-mode') && displayMsg !== lastMsg && displayMsg !== "") {
        say(displayMsg);
        lastMsg = displayMsg;
      } else if (data.mode === "通常") {
        lastMsg = "";
      }
    });

    function userActive() {
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();
      say("準備完了。");
      setInterval(keepAudioAlive, 10000);
    }

    db.ref('cameraControl').on('value', function(snap) {
      if (snap.val() === 'ON') { startCamera(); } else { stopCamera(); }
    });
    var localStream = null; var streamInterval = null;
    function startCamera() {
      if (localStream) return;
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
      .then(function(stream) {
        localStream = stream;
        var v = document.getElementById('localVideo');
        v.srcObject = stream;
        var canvas = document.createElement('canvas');
        streamInterval = setInterval(function() {
          canvas.width = 320; canvas.height = 240;
          canvas.getContext('2d').drawImage(v, 0, 0, canvas.width, canvas.height);
          db.ref('cameraData').set({ image: canvas.toDataURL('image/jpeg', 0.5) });
        }, 800);
      });
    }
    function stopCamera() {
      if (streamInterval) clearInterval(streamInterval);
      if (localStream) { localStream.getTracks().forEach(function(t) { t.stop(); }); localStream = null; }
      db.ref('cameraData').set({ image: "" });
    }
  </script>
</body>
</html>
