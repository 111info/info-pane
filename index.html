<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>家族パネル - 子機</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { 
      margin: 0; background-color: #eaddca; color: #3e2723; 
      font-family: "Hiragino Kaku Gothic ProN", sans-serif; 
      transition: 0.5s; overflow: hidden; touch-action: manipulation;
    }

    /* 1. 認証画面（起動時に表示） */
    #auth-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #4e342e; color: white; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 20000;
    }
    #auth-screen h2 { font-size: 5vw; margin-bottom: 30px; letter-spacing: 2px; }
    #pass-input { 
      font-size: 32px; padding: 15px; width: 280px; border-radius: 20px; 
      border: 3px solid #8d6e63; text-align: center; margin-bottom: 25px;
      outline: none; background: #fff;
    }
    #login-btn {
      font-size: 24px; padding: 12px 50px; border-radius: 50px;
      border: none; background: #d7ccc8; color: #4e342e; font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer;
    }

    /* メイン画面（認証後に表示） */
    #main-wrapper { display: none; width: 100vw; height: 100vh; padding: 25px; box-sizing: border-box; }

    /* 左：メイン（時計 ＆ ごはん・お風呂専用） */
    #left-panel {
      flex: 1.3; background: rgba(255,255,255,0.4); border-radius: 50px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      margin-right: 25px; border: 2px solid rgba(255,255,255,0.5);
      transition: all 0.5s ease; padding: 20px;
    }
    #main-display { font-size: 16vw; font-weight: 900; text-align: center; line-height: 1.2; white-space: pre-wrap; }
    #sub-date { font-size: 5vw; font-weight: bold; margin-top: 20px; color: #795548; }

    /* 右：お知らせ履歴（自由入力用） */
    #right-panel { flex: 1; display: flex; flex-direction: column; }
    #history-title { font-size: 4vw; font-weight: 900; margin-bottom: 15px; padding-left: 10px; }
    
    .history-card {
      background: rgba(255,255,255,0.8); border-radius: 30px; margin-bottom: 15px;
      padding: 15px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px solid #d7ccc8;
      text-align: center; font-weight: bold; transition: 0.5s; position: relative; min-height: 80px;
    }
    
    #hist-text-0 { font-size: 5vw; color: #3e2723; }
    #hist-1 { opacity: 0.7; } #hist-2 { opacity: 0.5; }

    .mini-loader {
      display: none; width: 40px; height: 40px;
      border: 6px solid #d7ccc8; border-top: 6px solid #4e342e;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* フェードインアニメーション */
    .fade-in { animation: fadeInUp 0.8s ease forwards; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 背景変化 */
    .gohan-mode #left-panel { background-color: #ffeb3b; border-color: #fbc02d; color: #bf360c; }
    .ofuro-mode #left-panel { background-color: #bbdefb; border-color: #64b5f6; color: #0d47a1; }
    
    .night-mode { background: #000 !important; }
    .night-mode #main-wrapper { display: none; }
  </style>
</head>
<body>

  <div id="auth-screen">
    <h2>Family Pass</h2>
    <input type="password" id="pass-input" placeholder="****" autofocus>
    <button id="login-btn" onclick="checkAuth()">LOGIN</button>
  </div>

  <div id="main-wrapper">
    <div id="left-panel">
      <div id="main-display">00:00</div>
      <div id="sub-date">--月--日 (曜)</div>
    </div>
    <div id="right-panel">
      <div id="history-title">通知</div>
      <div id="hist-0" class="history-card">
        <div class="mini-loader" id="card-loader"></div>
        <span id="hist-text-0">-</span>
      </div>
      <div id="hist-1" class="history-card"><span id="hist-text-1">-</span></div>
      <div id="hist-2" class="history-card"><span id="hist-text-2">-</span></div>
    </div>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    var db = firebase.database();

    var isReady = false;
    var lastMode = "";
    var msgHistory = ["-", "-", "-"];
    var speechTimer = null;

    // パスワードチェック (1371)
    function checkAuth() {
      const pass = document.getElementById('pass-input').value;
      if(pass === "1371") { 
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-wrapper').style.display = 'flex';
        isReady = true;
        // iPad音声ロック解除
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("パネルを起動しました"));
      } else {
        alert("パスワードが正しくありません");
      }
    }

    function updateClock() {
      var now = new Date();
      var dayList = ["日", "月", "火", "水", "木", "金", "土"];
      document.getElementById('sub-date').innerText = (now.getMonth() + 1) + "月" + now.getDate() + "日 (" + dayList[now.getDay()] + ")";
      if (lastMode !== "ごはん" && lastMode !== "お風呂") {
        document.getElementById('main-display').innerText = ("0" + now.getHours()).slice(-2) + ":" + ("0" + now.getMinutes()).slice(-2);
        document.getElementById('main-display').style.fontSize = "16vw";
      }
    }
    setInterval(updateClock, 1000);

    // 音声ループ機能（10秒おき）
    function startVoiceLoop(text) {
      stopVoiceLoop();
      const cleanText = text.replace(/ご飯/g, "ごはん").replace(/行ってきます/g, "いってきます");
      const speak = () => {
        if(!isReady) return;
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(cleanText);
        uttr.lang = "ja-JP"; uttr.rate = 0.9;
        window.speechSynthesis.speak(uttr);
      };
      speak();
      speechTimer = setInterval(speak, 10000);
    }

    function stopVoiceLoop() {
      if(speechTimer) { clearInterval(speechTimer); speechTimer = null; }
      window.speechSynthesis.cancel();
    }

    function setAdaptiveFontSize(element, text, baseSize) {
      let size = baseSize;
      if (text.length > 10) size = baseSize * 0.7;
      element.style.fontSize = size + "vw";
      element.innerText = text;
    }

    db.ref('currentStatus').on('value', function(snap) {
      var data = snap.val();
      if (!data || !isReady) return;
      var mode = data.mode || "通常";
      var body = document.body;
      var mainDisp = document.getElementById('main-display');

      if (mode !== lastMode) {
        if (mode === "通常") {
          stopVoiceLoop();
          body.classList.remove('gohan-mode', 'ofuro-mode');
          updateClock();
        } 
        else if (mode === "ごはん" || mode === "お風呂") {
          body.classList.remove('gohan-mode', 'ofuro-mode');
          body.classList.add(mode === "ごはん" ? 'gohan-mode' : 'ofuro-mode');
          mainDisp.innerText = mode + "\nです";
          mainDisp.style.fontSize = "11vw";
          startVoiceLoop(mode + "です。準備してください。");
          lastMode = mode; // 履歴に入れないためにここで更新
        } 
        else {
          // お知らせ：右側のみ・5秒ロード・履歴あり
          const loader = document.getElementById('card-loader');
          const histText0 = document.getElementById('hist-text-0');
          histText0.style.display = "none";
          loader.style.display = "block";
          
          setTimeout(function() {
            loader.style.display = "none";
            histText0.style.display = "inline";
            histText0.classList.remove("fade-in");
            void histText0.offsetWidth;
            histText0.classList.add("fade-in");

            msgHistory.unshift(mode);
            msgHistory = msgHistory.slice(0, 3);
            setAdaptiveFontSize(document.getElementById('hist-text-0'), msgHistory[0], 5);
            setAdaptiveFontSize(document.getElementById('hist-text-1'), msgHistory[1], 3.5);
            setAdaptiveFontSize(document.getElementById('hist-text-2'), msgHistory[2], 2.5);
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(mode.replace(/行ってきます/g, "いってきます")));
            lastMode = mode;
          }, 5000);
        }
      }
    });
  </script>
</body>
</html>
