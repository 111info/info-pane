<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>家族パネル・子機</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { 
      margin: 0; background-color: #eaddca; color: #3e2723; 
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; 
      transition: 0.5s; overflow: hidden; touch-action: manipulation;
    }
    /* 開始ボタン */
    #start-button {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #4e342e; color: white; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
      z-index: 10000; border: none; font-size: 6vw; font-weight: bold;
    }

    #container { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; }
    
    /* 上側：お知らせ（45%） */
    #notice-section { flex: 0 0 45%; display: flex; align-items: center; justify-content: center; }
    #message-card { 
      width: 95%; height: 90%; background: rgba(255, 255, 255, 0.96); 
      border-radius: 40px; box-shadow: 0 12px 30px rgba(0,0,0,0.1);
      display: flex; justify-content: center; align-items: center; padding: 30px;
      box-sizing: border-box; border: 3px solid #d7ccc8;
      opacity: 0; transform: translateY(-15px); transition: all 0.5s ease;
    }
    .show-msg #message-card { opacity: 1; transform: translateY(0); }
    #message { font-size: 8vw; font-weight: 900; text-align: center; line-height: 1.25; color: #212121; }
    
    /* 下側：時計（55%・枠なし） */
    #clock-section { flex: 0 0 55%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    #info-date { font-size: 4.5vw; font-weight: bold; color: #795548; margin-bottom: 5px; }
    #clock { font-size: 24vw; font-weight: 900; line-height: 1; color: #4e342e; }
    
    /* 夜間モード */
    .night-mode { background-color: #000 !important; }
    .night-mode #container { display: none !important; }

    #localVideo { position: fixed; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <button id="start-button" onclick="userActive()">画面をタップして開始</button>

  <div id="container">
    <div id="notice-section">
      <div id="message-card"><div id="message"></div></div>
    </div>
    <div id="clock-section">
      <div id="info-date">--月--日 (曜)</div>
      <div id="clock">00:00</div>
    </div>
  </div>
  
  <video id="localVideo" autoplay playsinline muted></video>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    var db = firebase.database();
    var lastMsg = "";
    var isReady = false;

    // 時計更新
    function updateClock() {
      var now = new Date();
      var dayList = ["日", "月", "火", "水", "木", "金", "土"];
      document.getElementById('info-date').innerText = (now.getMonth() + 1) + "月" + now.getDate() + "日 (" + dayList[now.getDay()] + ")";
      document.getElementById('clock').innerText = ("0" + now.getHours()).slice(-2) + ":" + ("0" + now.getMinutes()).slice(-2);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 音声読み上げ（シンプル版）
    function say(txt) {
      if (!isReady || !txt) return;
      window.speechSynthesis.cancel();
      var uttr = new SpeechSynthesisUtterance(txt);
      uttr.lang = "ja-JP";
      uttr.rate = 0.9;
      window.speechSynthesis.speak(uttr);
    }

    // メインロジック（通知・夜間モード）
    db.ref('currentStatus').on('value', function(snap) {
      var data = snap.val();
      if (!data) return;
      var body = document.body;
      var h = new Date().getHours();
      
      // 夜間モード判定
      if (data.nightMode == 1 || (data.nightMode == 0 && (h >= 21 || h < 7))) {
        body.classList.add('night-mode');
      } else {
        body.classList.remove('night-mode');
      }

      // 通知表示
      var rawMsg = data.mode || "";
      body.classList.remove('show-msg');
      if (rawMsg !== "通常" && rawMsg !== "") {
        body.classList.add('show-msg');
        document.getElementById('message').innerText = rawMsg;
      }

      // 読み上げ
      if (!body.classList.contains('night-mode') && rawMsg !== lastMsg && rawMsg !== "" && rawMsg !== "通常") {
        say(rawMsg === "ごはん" ? "ごはんです" : (rawMsg === "お風呂" ? "お風呂です" : rawMsg));
        lastMsg = rawMsg;
      } else if (rawMsg === "通常") {
        lastMsg = "";
      }
    });

    // カメラ機能（再構築）
    var localStream = null;
    var streamInterval = null;
    db.ref('cameraControl').on('value', function(snap) {
      if (snap.val() === 'ON') { startCamera(); } else { stopCamera(); }
    });

    function startCamera() {
      if (localStream) return;
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
      .then(function(stream) {
        localStream = stream;
        var v = document.getElementById('localVideo');
        v.srcObject = stream;
        var canvas = document.createElement('canvas');
        streamInterval = setInterval(function() {
          if (!localStream) return;
          canvas.width = 320; canvas.height = 240;
          canvas.getContext('2d').drawImage(v, 0, 0, canvas.width, canvas.height);
          db.ref('cameraData').set({ image: canvas.toDataURL('image/jpeg', 0.5) });
        }, 1000);
      }).catch(err => console.error("Camera error:", err));
    }

    function stopCamera() {
      if (streamInterval) clearInterval(streamInterval);
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      db.ref('cameraData').set({ image: "" });
    }

    // 開始
    function userActive() {
      isReady = true;
      document.getElementById('start-button').style.display = 'none';
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();
      say("準備完了。");
      // スリープ防止（最小限）
      setInterval(() => {
        if(window.speechSynthesis.speaking) return;
        var s = new SpeechSynthesisUtterance("");
        s.volume = 0;
        window.speechSynthesis.speak(s);
      }, 15000);
    }
  </script>
</body>
</html>
