<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>家族インフォメーション</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    /* 1. 基本設定：白背景・黒文字 */
    body { 
      margin: 0; 
      background-color: white; 
      color: black; 
      font-family: "Helvetica Neue", "Arial", "Hiragino Sans", "Meiryo", sans-serif; 
      transition: 0.5s; 
      overflow: hidden; 
    }
    #panel { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    
    /* 2. 時計のデザイン（黒・極太） */
    #clock { font-size: 12vw; font-weight: 900; color: #333; }
    
    /* 3. 日付とお知らせのデザイン */
    #info-date { font-size: 3vw; font-weight: bold; color: #666; margin-top: 20px; }
    #message { 
      font-size: 8vw; 
      font-weight: 900; 
      color: black; 
      margin-top: 5px;
      padding: 0 40px;
      line-height: 1.2;
    }
    
    /* 4. 強調表示の調整（サイズを少し控えめに） */
    .alert-gohan #clock, .alert-ofuro #clock { display: none; }
    .alert-gohan #info-date, .alert-ofuro #info-date { display: none; }
    
    .alert-gohan #message { font-size: 12vw; color: #d32f2f; } /* ごはん：赤 */
    .alert-ofuro #message { font-size: 12vw; color: #2196F3; } /* お風呂：青 */

    /* 夜間モード：21時以降 */
    .night-mode { background-color: black !important; visibility: hidden; }
  </style>
</head>
<body>

  <div id="panel">
    <div id="clock">00:00</div>
    <div id="info-date"></div> <div id="message">おしらせ</div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('currentStatus');

    function update() {
      const now = new Date();
      const h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').innerText = `${h}:${m}`;

      if (h >= 21 || h < 7) {
        document.body.classList.add('night-mode');
      } else {
        document.body.classList.remove('night-mode');
      }
    }
    setInterval(update, 1000);

    // 受信処理
    db.on('value', (snap) => {
      const data = snap.val();
      if (!data) return;

      const body = document.body;
      const msg = document.getElementById('message');
      const dateArea = document.getElementById('info-date');

      // クラスをリセット
      body.classList.remove('alert-gohan', 'alert-ofuro');

      if (data.mode === 'ごはん') {
        body.classList.add('alert-gohan');
        msg.innerText = "ごはんです";
        say("ごはんの時間です");
      } else if (data.mode === 'お風呂') {
        body.classList.add('alert-ofuro');
        msg.innerText = "お風呂です";
        say("お風呂の時間です");
      } else {
        // 「通常」または「自由入力メッセージ」の場合
        if (data.mode === '通常') {
          msg.innerText = "おしらせはありません";
          dateArea.innerText = "";
        } else {
          // 親機からの自由入力メッセージを表示
          msg.innerText = data.mode;
          dateArea.innerText = data.date || ""; // 送信された日付を表示
          if (data.mode !== "おしらせはありません") {
            say(data.mode);
          }
        }
      }
    });

    function say(text) {
      const uttr = new SpeechSynthesisUtterance(text);
      uttr.lang = "ja-JP";
      window.speechSynthesis.speak(uttr);
    }
  </script>
</body>
</html>
