<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>家族パネル・子機</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { 
      margin: 0; background-color: #eaddca; color: #3e2723; 
      font-family: "Hiragino Kaku Gothic ProN", sans-serif; 
      transition: 0.5s; overflow: hidden; touch-action: manipulation;
    }
    /* 開始ボタン（画面全体を覆い、確実に押せるように） */
    #start-button {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #4e342e; color: white; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
      z-index: 10000; border: none; font-size: 6vw; font-weight: bold;
    }
    #start-button span { font-size: 3vw; margin-top: 20px; opacity: 0.8; }

    #container { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; }
    #notice-section { flex: 0 0 45%; display: flex; align-items: center; justify-content: center; }
    #message-card { 
      width: 95%; height: 90%; background: rgba(255, 255, 255, 0.96); 
      border-radius: 40px; box-shadow: 0 12px 30px rgba(0,0,0,0.1);
      display: flex; justify-content: center; align-items: center; padding: 30px;
      box-sizing: border-box; border: 3px solid #d7ccc8;
      opacity: 0; transform: translateY(-15px); transition: all 0.5s ease;
    }
    .show-msg #message-card { opacity: 1; transform: translateY(0); }
    #message { font-size: 7.5vw; font-weight: 900; text-align: center; line-height: 1.25; color: #212121; }
    #clock-section { flex: 0 0 55%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    #info-date { font-size: 4.5vw; font-weight: bold; color: #795548; margin-bottom: 5px; }
    #clock { font-size: 22vw; font-weight: 900; line-height: 1; color: #4e342e; }
    
    .night-mode { background-color: #000 !important; }
    .night-mode #container { display: none; }
    #localVideo { position: fixed; width: 1px; height: 1px; opacity: 0; }
  </style>
</head>
<body>
  <button id="start-button" onclick="userActive()">
    ここを一度タップしてください
    <span>システムを開始します</span>
  </button>

  <div id="container">
    <div id="notice-section">
      <div id="message-card"><div id="message"></div></div>
    </div>
    <div id="clock-section">
      <div id="info-date">--月--日 (曜)</div>
      <div id="clock">00:00</div>
    </div>
  </div>
  
  <video id="localVideo" autoplay playsinline muted></video>
  <audio id="dummy-audio" loop><source src="data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" type="audio/wav"></audio>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    var db = firebase.database();
    var lastMsg = "";
    var isReady = false;

    // 時計更新
    function updateClock() {
      if (document.body.classList.contains('night-mode')) return;
      var now = new Date();
      var dayList = ["日", "月", "火", "水", "木", "金", "土"];
      document.getElementById('info-date').innerText = (now.getMonth() + 1) + "月" + now.getDate() + "日 (" + dayList[now.getDay()] + ")";
      document.getElementById('clock').innerText = now.getHours() + ":" + ("0" + now.getMinutes()).slice(-2);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 音声読み上げ
    function say(txt) {
      if (!isReady) return;
      window.speechSynthesis.cancel();
      var uttr = new SpeechSynthesisUtterance(txt);
      uttr.lang = "ja-JP";
      uttr.rate = 0.85;
      window.speechSynthesis.speak(uttr);
    }

    // データ受信
    db.ref('currentStatus').on('value', function(snap) {
      var data = snap.val();
      if (!data) return;
      var body = document.body;
      var h = new Date().getHours();
      
      if (data.nightMode == 1 || (data.nightMode == 0 && (h >= 21 || h < 7))) {
        body.classList.add('night-mode');
      } else {
        body.classList.remove('night-mode');
      }

      body.classList.remove('alert-gohan', 'alert-ofuro', 'show-msg');
      var displayMsg = "";
      
      if (data.mode === 'ごはん') {
        body.classList.add('alert-gohan', 'show-msg');
        displayMsg = "ごはんです";
      } else if (data.mode === 'お風呂') {
        body.classList.add('alert-ofuro', 'show-msg');
        displayMsg = "お風呂です";
      } else if (data.mode !== "通常" && data.mode !== "") {
        body.classList.add('show-msg');
        displayMsg = data.mode;
      }
      document.getElementById('message').innerText = displayMsg;

      if (!body.classList.contains('night-mode') && displayMsg !== lastMsg && displayMsg !== "") {
        say(displayMsg);
        lastMsg = displayMsg;
      } else if (data.mode === "通常") {
        lastMsg = "";
      }
    });

    // ★音声解禁のための重要処理
    function userActive() {
      isReady = true;
      document.getElementById('start-button').style.display = 'none';
      
      // 1. AudioContextを再開
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();
      
      // 2. ダミーの無音ループ再生を開始（スピーカーをアクティブに保つ）
      var dummy = document.getElementById('dummy-audio');
      dummy.play().catch(function(e){ console.log(e); });
      
      // 3. 確認の読み上げ
      say("システムを開始しました。");

      // 4. 定期的に無音を喋らせてSpeechエンジンが寝るのを防ぐ
      setInterval(function() {
        var silence = new SpeechSynthesisUtterance("");
        silence.volume = 0;
        window.speechSynthesis.speak(silence);
      }, 10000);
    }

    // カメラ
    db.ref('cameraControl').on('value', function(snap) {
      if (snap.val() === 'ON') { startCamera(); } else { stopCamera(); }
    });
    var localStream = null; var streamInterval = null;
    function startCamera() {
      if (localStream) return;
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
      .then(function(stream) {
        localStream = stream;
        document.getElementById('localVideo').srcObject = stream;
        var canvas = document.createElement('canvas');
        streamInterval = setInterval(function() {
          canvas.width = 320; canvas.height = 240;
          canvas.getContext('2d').drawImage(document.getElementById('localVideo'), 0, 0, canvas.width, canvas.height);
          db.ref('cameraData').set({ image: canvas.toDataURL('image/jpeg', 0.5) });
        }, 800);
      });
    }
    function stopCamera() {
      if (streamInterval) clearInterval(streamInterval);
      if (localStream) { localStream.getTracks().forEach(function(t) { t.stop(); }); localStream = null; }
      db.ref('cameraData').set({ image: "" });
    }
  </script>
</body>
</html>
