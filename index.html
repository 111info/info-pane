<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ひなたアシスタント</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { 
      margin: 0; background-color: #eaddca; color: #3e2723; 
      font-family: "Hiragino Kaku Gothic ProN", sans-serif; 
      transition: 0.5s; overflow: hidden; touch-action: manipulation;
    }
    /* 開始ボタン（確実に反応させる） */
    #start-button {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #4e342e; color: white; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
      z-index: 10000; border: none; font-size: 6vw; font-weight: bold;
    }
    #container { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; }
    #notice-section { flex: 0 0 45%; display: flex; align-items: center; justify-content: center; }
    #message-card { 
      width: 95%; height: 90%; background: rgba(255, 255, 255, 0.96); 
      border-radius: 40px; box-shadow: 0 12px 30px rgba(0,0,0,0.1);
      display: flex; justify-content: center; align-items: center; padding: 30px;
      box-sizing: border-box; border: 3px solid #d7ccc8;
      opacity: 0; transform: translateY(-15px); transition: all 0.5s ease;
    }
    .show-msg #message-card { opacity: 1; transform: translateY(0); }
    #message { font-size: 8vw; font-weight: 900; text-align: center; line-height: 1.25; color: #212121; }
    
    #clock-section { flex: 0 0 55%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    #info-date { font-size: 4.5vw; font-weight: bold; color: #795548; margin-bottom: 5px; }
    #clock { font-size: 24vw; font-weight: 900; line-height: 1; color: #4e342e; }
    
    #localVideo { position: fixed; width: 1px; height: 1px; opacity: 0; }
  </style>
</head>
<body>
  <button id="start-button" onclick="userActive()">
    画面をタップしてください
    <div style="font-size:3vw; margin-top:20px;">「ひなた」と呼ぶと反応します</div>
  </button>

  <div id="container">
    <div id="notice-section">
      <div id="message-card"><div id="message"></div></div>
    </div>
    <div id="clock-section">
      <div id="info-date">--月--日 (曜)</div>
      <div id="clock">00:00</div>
    </div>
  </div>
  
  <video id="localVideo" autoplay playsinline muted></video>
  <audio id="dummy-audio" loop><source src="data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" type="audio/wav"></audio>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    var db = firebase.database();
    var lastMsg = "";
    var isReady = false;

    // 時計更新
    function updateClock() {
      var now = new Date();
      var dayList = ["日", "月", "火", "水", "木", "金", "土"];
      document.getElementById('info-date').innerText = (now.getMonth() + 1) + "月" + now.getDate() + "日 (" + dayList[now.getDay()] + ")";
      document.getElementById('clock').innerText = ("0" + now.getHours()).slice(-2) + ":" + ("0" + now.getMinutes()).slice(-2);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 音声読み上げ
    function say(txt) {
      if (!isReady || !txt) return;
      window.speechSynthesis.cancel();
      var uttr = new SpeechSynthesisUtterance(txt);
      uttr.lang = "ja-JP";
      uttr.rate = 0.9; 
      uttr.pitch = 1.1;
      window.speechSynthesis.speak(uttr);
    }

    // ★ひなたアシスタントの知能（シンプル版）
    function hinataAssistant(text) {
      if (text === "ごはん") return "ごはんです。";
      if (text === "お風呂") return "お風呂です。";
      if (text.includes("何時") || text.includes("いま")) {
        var now = new Date();
        return "現在は" + now.getHours() + "時" + now.getMinutes() + "分です。";
      }
      return text;
    }

    // 音声認識（呼びかけ待機）
    function startListening() {
      var Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Recognition) return;
      var rec = new Recognition();
      rec.lang = "ja-JP";
      rec.continuous = false; // iPadの安定性のために1回ずつ区切る

      rec.onresult = function(event) {
        var result = event.results[0][0].transcript;
        if (result.includes("ひなた")) {
          say("はい、ひなたです。");
        } else if (result.includes("何時") || result.includes("時間")) {
            say(hinataAssistant("何時"));
        }
      };

      // 止まったら即座に再起動して「常時待機」を模倣
      rec.onend = function() { rec.start(); }; 
      rec.onerror = function() { setTimeout(function(){ rec.start(); }, 1000); };
      rec.start();
    }

    // Firebase受信
    db.ref('currentStatus').on('value', function(snap) {
      var data = snap.val();
      if (!data) return;
      var rawMsg = data.mode || "";
      var displayMsg = hinataAssistant(rawMsg);

      var body = document.body;
      body.classList.remove('show-msg');
      if (rawMsg !== "通常" && rawMsg !== "") body.classList.add('show-msg');
      document.getElementById('message').innerText = rawMsg === "通常" ? "" : rawMsg;

      if (displayMsg !== lastMsg && displayMsg !== "") {
        say(displayMsg);
        lastMsg = displayMsg;
      } else if (rawMsg === "通常") {
        lastMsg = "";
      }
    });

    // システム開始
    function userActive() {
      isReady = true;
      document.getElementById('start-button').style.display = 'none';
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();
      document.getElementById('dummy-audio').play();
      
      say("ひなた、準備できました。");
      startListening(); 

      // Speechエンジンを眠らせない
      setInterval(function() {
        var silence = new SpeechSynthesisUtterance("");
        silence.volume = 0;
        window.speechSynthesis.speak(silence);
      }, 10000);
    }
  </script>
</body>
</html>
