<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>家族パネル・子機</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { margin: 0; background-color: white; color: black; font-family: sans-serif; transition: 0.5s; overflow: hidden; }
    #panel { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    #clock { font-size: 12vw; font-weight: 900; color: #333; }
    #info-date { font-size: 3vw; font-weight: bold; color: #666; margin-top: 20px; }
    #message { font-size: 8vw; font-weight: 900; margin-top: 5px; padding: 0 40px; line-height: 1.2; }
    .alert-gohan #clock, .alert-ofuro #clock { display: none; }
    .alert-gohan #message { font-size: 12vw; color: #d32f2f; }
    .alert-ofuro #message { font-size: 12vw; color: #2196F3; }
    .night-mode { background-color: black !important; }
    .night-mode #panel { display: none; }
    #localVideo { position: fixed; top:0; left:0; width: 1px; height: 1px; opacity: 0; }
  </style>
</head>
<body onclick="userActive()">
  <div id="panel">
    <div id="clock">00:00</div>
    <div id="info-date"></div>
    <div id="message">準備中...</div>
  </div>
  <video id="localVideo" autoplay playsinline muted></video>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    var db = firebase.database();

    var isNight = false;
    var streamInterval = null;
    var localStream = null;

    // 時計
    setInterval(function() {
      if (isNight) return;
      var now = new Date();
      document.getElementById('clock').innerText = now.getHours() + ":" + ("0" + now.getMinutes()).slice(-2);
    }, 1000);

    // 状態受信
    db.ref('currentStatus').on('value', function(snap) {
      var data = snap.val();
      if (!data) return;
      var h = new Date().getHours();
      var nm = data.nightMode || 0;
      if (nm == 1 || (nm == 0 && (h >= 21 || h < 7))) {
        isNight = true; document.body.classList.add('night-mode');
      } else {
        isNight = false; document.body.classList.remove('night-mode');
      }
      document.body.classList.remove('alert-gohan', 'alert-ofuro');
      if (data.mode === 'ごはん') {
        document.body.classList.add('alert-gohan');
        document.getElementById('message').innerText = "ごはんです";
      } else if (data.mode === 'お風呂') {
        document.body.classList.add('alert-ofuro');
        document.getElementById('message').innerText = "お風呂です";
      } else {
        document.getElementById('message').innerText = data.mode || "おしらせはありません";
        document.getElementById('info-date').innerText = data.date || "";
      }
    });

    // カメラ
    db.ref('cameraControl').on('value', function(snap) {
      if (snap.val() === 'ON') { startCamera(); } else { stopCamera(); }
    });

    function startCamera() {
      if (localStream) return;
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
      .then(function(stream) {
        localStream = stream;
        var v = document.getElementById('localVideo');
        v.srcObject = stream;
        var canvas = document.createElement('canvas');
        streamInterval = setInterval(function() {
          canvas.width = 320; canvas.height = 240;
          canvas.getContext('2d').drawImage(v, 0, 0, canvas.width, canvas.height);
          db.ref('cameraData').set({ image: canvas.toDataURL('image/jpeg', 0.5) });
        }, 800);
      }).catch(function(e){ console.log(e); });
    }

    function stopCamera() {
      if (streamInterval) clearInterval(streamInterval);
      if (localStream) {
        localStream.getTracks().forEach(function(t) { t.stop(); });
        localStream = null;
      }
      db.ref('cameraData').set({ image: "" }); // 画像を空にする
    }

    function userActive() {
      try {
        var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioCtx.resume();
      } catch(e){}
    }
  </script>
</body>
</html>
