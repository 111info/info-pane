<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>家族パネル・子機</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    /* 全体：UDフォントと土壁カラー */
    body { 
      margin: 0; 
      background-color: #eaddca; 
      color: #3e2723; 
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif; 
      transition: 0.5s; 
      overflow: hidden;
    }

    #container {
      display: flex;
      width: 100vw;
      height: 100vh;
      align-items: center;
    }

    /* 左側 60%：時計エリア（絶対に被らない） */
    #clock-section {
      flex: 0 0 60%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 40px;
      box-sizing: border-box;
    }

    #info-date { 
      font-size: 3.5vw; 
      font-weight: bold; 
      color: #795548;
      margin-bottom: 5px;
    }

    #clock { 
      font-size: 18vw; 
      font-weight: 900; 
      line-height: 1;
      letter-spacing: -2px;
      color: #4e342e;
    }

    /* 右側 40%：通知エリア */
    #notice-section {
      flex: 0 0 40%;
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 右からスライドしてくる通知カード */
    #message-card { 
      position: absolute;
      right: -110%; /* 通常時は画面外 */
      width: 90%;
      height: 85%;
      background: rgba(255, 255, 255, 0.95); 
      border-radius: 40px; 
      box-shadow: -10px 10px 30px rgba(0,0,0,0.15);
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 30px;
      box-sizing: border-box;
      transition: right 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      border: 3px solid #d7ccc8;
    }

    /* 通知がある時だけスライドイン */
    .show-msg #message-card { 
      right: 20px; 
    }

    #message { 
      font-size: 6.5vw; 
      font-weight: 900; 
      text-align: center; 
      line-height: 1.4;
      color: #212121;
    }

    /* 特殊モード */
    .alert-gohan #message-card { background: #fff8f8; border-color: #ff8a80; }
    .alert-gohan #message { color: #d32f2f; }
    .alert-ofuro #message-card { background: #f0f8ff; border-color: #82b1ff; }
    .alert-ofuro #message { color: #1976d2; }

    /* 夜間モード */
    .night-mode { background-color: #000 !important; }
    .night-mode #container { display: none; }

    #localVideo { position: fixed; width: 1px; height: 1px; opacity: 0; }
  </style>
</head>
<body onclick="userActive()">
  <div id="container">
    <div id="clock-section">
      <div id="info-date"></div>
      <div id="clock">00:00</div>
    </div>
    <div id="notice-section">
      <div id="message-card">
        <div id="message">準備中</div>
      </div>
    </div>
  </div>
  <video id="localVideo" autoplay playsinline muted></video>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    var db = firebase.database();
    var lastMsg = "";

    setInterval(function() {
      if (document.body.classList.contains('night-mode')) return;
      var now = new Date();
      document.getElementById('clock').innerText = now.getHours() + ":" + ("0" + now.getMinutes()).slice(-2);
    }, 1000);

    db.ref('currentStatus').on('value', function(snap) {
      var data = snap.val();
      if (!data) return;
      var body = document.body;
      var h = new Date().getHours();
      
      if (data.nightMode == 1 || (data.nightMode == 0 && (h >= 21 || h < 7))) {
        body.classList.add('night-mode');
      } else {
        body.classList.remove('night-mode');
      }

      body.classList.remove('alert-gohan', 'alert-ofuro', 'show-msg');
      var displayMsg = "";
      
      if (data.mode === 'ごはん') {
        body.classList.add('alert-gohan', 'show-msg');
        displayMsg = "ごはんです";
      } else if (data.mode === 'お風呂') {
        body.classList.add('alert-ofuro', 'show-msg');
        displayMsg = "お風呂です";
      } else if (data.mode !== "通常" && data.mode !== "") {
        body.classList.add('show-msg');
        displayMsg = data.mode;
        document.getElementById('info-date').innerText = data.date || "";
      }

      document.getElementById('message').innerText = displayMsg;

      if (!body.classList.contains('night-mode') && displayMsg !== lastMsg && displayMsg !== "") {
        say(displayMsg);
        lastMsg = displayMsg;
      } else if (data.mode === "通常") {
        lastMsg = "";
      }
    });

    db.ref('cameraControl').on('value', function(snap) {
      if (snap.val() === 'ON') { startCamera(); } else { stopCamera(); }
    });

    var localStream = null; var streamInterval = null;
    function startCamera() {
      if (localStream) return;
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
      .then(function(stream) {
        localStream = stream;
        var v = document.getElementById('localVideo');
        v.srcObject = stream;
        var canvas = document.createElement('canvas');
        streamInterval = setInterval(function() {
          canvas.width = 320; canvas.height = 240;
          canvas.getContext('2d').drawImage(v, 0, 0, canvas.width, canvas.height);
          db.ref('cameraData').set({ image: canvas.toDataURL('image/jpeg', 0.5) });
        }, 800);
      });
    }

    function stopCamera() {
      if (streamInterval) clearInterval(streamInterval);
      if (localStream) { localStream.getTracks().forEach(function(t) { t.stop(); }); localStream = null; }
      db.ref('cameraData').set({ image: "" });
    }

    function say(txt) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      var uttr = new SpeechSynthesisUtterance(txt);
      uttr.lang = "ja-JP";
      uttr.rate = 0.85; 
      window.speechSynthesis.speak(uttr);
    }

    function userActive() {
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();
      say("準備完了");
    }
  </script>
</body>
</html>
