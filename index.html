<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>インフォメーションパネル</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { 
      margin: 0; background-color: #eaddca; color: #3e2723; 
      font-family: "Hiragino Kaku Gothic ProN", sans-serif; 
      transition: 0.5s; overflow: hidden; touch-action: manipulation;
    }
    #start-button {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #4e342e; color: white; display: flex;
      justify-content: center; align-items: center; z-index: 10000; border: none; font-size: 5vw;
    }

    #main-wrapper { display: flex; width: 100vw; height: 100vh; padding: 25px; box-sizing: border-box; }

    /* 左：メイン（時計 ＆ ごはん・お風呂専用） */
    #left-panel {
      flex: 1.3; background: rgba(255,255,255,0.4); border-radius: 50px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      margin-right: 25px; border: 2px solid rgba(255,255,255,0.5);
      transition: all 0.5s ease; padding: 20px;
    }
    #main-display { font-size: 16vw; font-weight: 900; text-align: center; line-height: 1.2; white-space: pre-wrap; }
    #sub-date { font-size: 5vw; font-weight: bold; margin-top: 20px; color: #795548; }

    /* 右：お知らせ履歴（自由入力の通知はここでロード） */
    #right-panel { flex: 1; display: flex; flex-direction: column; }
    #history-title { font-size: 4vw; font-weight: 900; margin-bottom: 15px; padding-left: 10px; }
    
    .history-card {
      background: rgba(255,255,255,0.8); border-radius: 30px; margin-bottom: 15px;
      padding: 15px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px solid #d7ccc8;
      text-align: center; font-weight: bold; transition: 0.5s; position: relative; min-height: 80px;
    }
    
    #hist-0 { flex: 1.2; background: #fff; color: #3e2723; } 
    #hist-1 { flex: 1.0; opacity: 0.7; }
    #hist-2 { flex: 0.8; opacity: 0.5; }

    /* ミニ・ロードマーク */
    .mini-loader {
      display: none; width: 40px; height: 40px;
      border: 6px solid #d7ccc8; border-top: 6px solid #4e342e;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 通知アニメーション */
    .fade-in { animation: fadeInUp 0.8s ease forwards; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .gohan-mode #left-panel { background-color: #ffeb3b; border-color: #fbc02d; color: #bf360c; }
    .ofuro-mode #left-panel { background-color: #bbdefb; border-color: #64b5f6; color: #0d47a1; }
    .night-mode { background: #000 !important; }
    .night-mode #main-wrapper { display: none; }
    #localVideo { position: fixed; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <button id="start-button" onclick="userActive()">システム開始</button>

  <div id="main-wrapper">
    <div id="left-panel">
      <div id="main-display">00:00</div>
      <div id="sub-date">--月--日 (曜)</div>
    </div>
    <div id="right-panel">
      <div id="history-title">通知</div>
      <div id="hist-0" class="history-card"><div class="mini-loader" id="card-loader"></div><span id="hist-text-0">-</span></div>
      <div id="hist-1" class="history-card"><span id="hist-text-1">-</span></div>
      <div id="hist-2" class="history-card"><span id="hist-text-2">-</span></div>
    </div>
  </div>

  <video id="localVideo" autoplay playsinline muted></video>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    var db = firebase.database();
    var isReady = false;
    var lastMode = "";
    var msgHistory = ["-", "-", "-"];

    function updateClock() {
      var now = new Date();
      var dayList = ["日", "月", "火", "水", "木", "金", "土"];
      document.getElementById('sub-date').innerText = (now.getMonth() + 1) + "月" + now.getDate() + "日 (" + dayList[now.getDay()] + ")";
      if (lastMode !== "ごはん" && lastMode !== "お風呂") {
        document.getElementById('main-display').innerText = ("0" + now.getHours()).slice(-2) + ":" + ("0" + now.getMinutes()).slice(-2);
        document.getElementById('main-display').style.fontSize = "16vw";
      }
    }
    setInterval(updateClock, 1000);

    function adjustReading(txt) {
      return txt.replace(/行ってきます/g, "いってきます").replace(/行ってらっしゃい/g, "いってらっしゃい").replace(/ご飯/g, "ごはん");
    }

    function say(txt) {
      if (!isReady || !txt || txt === "通常") return;
      window.speechSynthesis.cancel();
      var uttr = new SpeechSynthesisUtterance(adjustReading(txt));
      uttr.lang = "ja-JP"; uttr.rate = 0.9;
      window.speechSynthesis.speak(uttr);
    }

    function setAdaptiveFontSize(element, text, baseSize) {
      let size = baseSize;
      if (text.length > 15) size = baseSize * 0.5;
      else if (text.length > 10) size = baseSize * 0.7;
      else if (text.length > 5) size = baseSize * 0.85;
      element.style.fontSize = size + "vw";
      element.innerText = text;
    }

    db.ref('currentStatus').on('value', function(snap) {
      var data = snap.val();
      if (!data) return;
      var mode = data.mode || "通常";
      var body = document.body;
      var mainDisp = document.getElementById('main-display');
      var loader = document.getElementById('card-loader');
      var histText0 = document.getElementById('hist-text-0');

      // 夜間モード
      var h = new Date().getHours();
      if (data.nightMode == 1 || (data.nightMode == 0 && (h >= 21 || h < 7))) {
        body.classList.add('night-mode');
      } else {
        body.classList.remove('night-mode');
      }

      if (mode !== "通常" && mode !== lastMode) {
        // パターンA: ごはん・お風呂（左側のみ・即時・履歴なし）
        if (mode === "ごはん" || mode === "お風呂") {
          body.classList.remove('gohan-mode', 'ofuro-mode');
          if (mode === "ごはん") {
            body.classList.add('gohan-mode');
            mainDisp.innerText = "ごはん\nです";
            mainDisp.style.fontSize = "11vw";
          } else {
            body.classList.add('ofuro-mode');
            mainDisp.innerText = "お風呂\nです";
            mainDisp.style.fontSize = "11vw";
          }
          say(mode === "ごはん" ? "ごはんです" : "お風呂です");
          lastMode = mode;
        } 
        // パターンB: お知らせ（右側のみ・5秒ロード・履歴あり）
        else {
          histText0.style.display = "none";
          loader.style.display = "block";
          
          setTimeout(function() {
            loader.style.display = "none";
            histText0.style.display = "inline";
            histText0.classList.remove("fade-in");
            void histText0.offsetWidth;
            histText0.classList.add("fade-in");

            msgHistory.unshift(mode);
            msgHistory = msgHistory.slice(0, 3);
            setAdaptiveFontSize(document.getElementById('hist-text-0'), msgHistory[0], 5);
            setAdaptiveFontSize(document.getElementById('hist-text-1'), msgHistory[1], 3.5);
            setAdaptiveFontSize(document.getElementById('hist-text-2'), msgHistory[2], 2.5);
            
            say(mode);
            lastMode = mode;
          }, 5000);
        }
      } else if (mode === "通常") {
        body.classList.remove('gohan-mode', 'ofuro-mode');
        lastMode = "通常";
        updateClock();
      }
    });

    // カメラ機能
    db.ref('cameraControl').on('value', function(snap) {
      if (snap.val() === 'ON') startCamera(); else stopCamera();
    });
    var localStream = null;
    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
        localStream = stream;
        document.getElementById('localVideo').srcObject = stream;
        setInterval(() => {
          if (!localStream) return;
          var canvas = document.createElement('canvas');
          canvas.width = 320; canvas.height = 240;
          canvas.getContext('2d').drawImage(document.getElementById('localVideo'), 0,0,320,240);
          db.ref('cameraData').set({ image: canvas.toDataURL('image/jpeg', 0.5) });
        }, 1000);
      });
    }
    function stopCamera() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }

    function userActive() {
      isReady = true;
      document.getElementById('start-button').style.display = 'none';
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();
    }
  </script>
</body>
</html>
