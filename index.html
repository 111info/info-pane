<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>家族パネル・子機</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { margin: 0; background-color: white; color: black; font-family: sans-serif; transition: 0.5s; overflow: hidden; }
    #panel { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    #clock { font-size: 12vw; font-weight: 900; color: #333; }
    #info-date { font-size: 3vw; font-weight: bold; color: #666; margin-top: 20px; }
    #message { font-size: 8vw; font-weight: 900; margin-top: 5px; padding: 0 40px; line-height: 1.2; }
    .alert-gohan #clock, .alert-ofuro #clock { display: none; }
    .alert-gohan #message { font-size: 12vw; color: #d32f2f; }
    .alert-ofuro #message { font-size: 12vw; color: #2196F3; }
    .night-mode { background-color: black !important; }
    .night-mode #panel { display: none; }
    /* カメラ映像（子機側は非表示でOK） */
    #localVideo { position: fixed; width: 1px; height: 1px; opacity: 0; }
  </style>
</head>
<body onclick="startCameraSetup()">

  <div id="panel">
    <div id="clock">00:00</div>
    <div id="info-date"></div>
    <div id="message">おしらせ</div>
  </div>
  <video id="localVideo" autoplay playsinline muted></video>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('currentStatus');
    const camRef = firebase.database().ref('cameraData');

    let isNight = false;
    let localStream = null;
    let peerConnection = null;

    // 時計更新
    function update() {
      if (isNight) return;
      const now = new Date();
      document.getElementById('clock').innerText = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
    }
    setInterval(update, 1000);

    // ステータス受信
    db.on('value', (snap) => {
      const data = snap.val();
      if (!data) return;
      const h = new Date().getHours();
      const mode = data.nightMode || 0;
      if (mode == 1 || (mode == 0 && (h >= 21 || h < 7))) {
        isNight = true;
        document.body.classList.add('night-mode');
      } else {
        isNight = false;
        document.body.classList.remove('night-mode');
      }
      document.body.classList.remove('alert-gohan', 'alert-ofuro');
      if (data.mode === 'ごはん') {
        document.body.classList.add('alert-gohan');
        document.getElementById('message').innerText = "ごはんです";
      } else if (data.mode === 'お風呂') {
        document.body.classList.add('alert-ofuro');
        document.getElementById('message').innerText = "お風呂です";
      } else {
        document.getElementById('message').innerText = data.mode || "おしらせはありません";
        document.getElementById('info-date').innerText = data.date || "";
      }
    });

    // --- カメラ機能のコア部分 ---
    // 親機からのカメラ要求を監視
    firebase.database().ref('cameraControl').on('value', async (snap) => {
      const cmd = snap.val();
      if (cmd === 'ON') {
        await startCamera();
      } else if (cmd === 'OFF') {
        stopCamera();
      }
    });

    async function startCamera() {
      if (localStream) return;
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
        document.getElementById('localVideo').srcObject = localStream;
        // 本来はここにWebRTCのシグナリングを書きますが、
        // iPad Air 1では「静止画を連続送信」する方が安定するため、今回は簡易版として実装します。
        startSnapshotStreaming();
      } catch (e) { alert("カメラ起動失敗"); }
    }

    function stopCamera() {
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      clearInterval(streamInterval);
    }

    let streamInterval;
    function startSnapshotStreaming() {
      const canvas = document.createElement('canvas');
      const video = document.getElementById('localVideo');
      streamInterval = setInterval(() => {
        if (!localStream) return;
        canvas.width = 320;
        canvas.height = 240;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const data = canvas.toDataURL('image/jpeg', 0.5);
        camRef.set({ image: data });
      }, 500); // 0.5秒ごとに更新（バッテリー優先）
    }

    function startCameraSetup() {
      // iOSの儀式用
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();
      console.log("Interaction started");
    }
  </script>
</body>
</html>
