<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族パネル・子機</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { margin: 0; background-color: white; color: black; font-family: sans-serif; transition: 0.5s; overflow: hidden; }
    #panel { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    #clock { font-size: 12vw; font-weight: 900; color: #333; }
    #info-date { font-size: 3vw; font-weight: bold; color: #666; margin-top: 20px; }
    #message { font-size: 8vw; font-weight: 900; margin-top: 5px; padding: 0 40px; line-height: 1.2; }
    
    /* 強調表示 */
    .alert-gohan #clock, .alert-ofuro #clock { display: none; }
    .alert-gohan #message { font-size: 12vw; color: #d32f2f; }
    .alert-ofuro #message { font-size: 12vw; color: #2196F3; }

    /* 超・夜間モード：真っ黒にして何も表示しない */
    .night-mode { background-color: black !important; }
    .night-mode #panel { display: none; }

    /* カメラ映像の隠し要素 */
    #localVideo { position: fixed; bottom: 0; right: 0; width: 1px; height: 1px; opacity: 0; }
  </style>
</head>
<body onclick="initCamera()"> <div id="panel">
    <div id="clock">00:00</div>
    <div id="info-date"></div>
    <div id="message">おしらせ</div>
  </div>
  <video id="localVideo" autoplay playsinline muted></video>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('currentStatus');

    let isNight = false;

    // 1秒ごとの更新
    function update() {
      if (isNight) return; // 夜間モード中は処理をスキップして節電
      const now = new Date();
      document.getElementById('clock').innerText = 
        now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
    }
    setInterval(update, 1000);

    // データ受信
    db.on('value', (snap) => {
      const data = snap.val();
      if (!data) return;

      const body = document.body;
      const msg = document.getElementById('message');
      const dateArea = document.getElementById('info-date');

      // 1. 夜間モード判定（0:自動, 1:強制夜, 2:強制昼）
      const h = new Date().getHours();
      const mode = data.nightMode || 0;
      if (mode == 1 || (mode == 0 && (h >= 21 || h < 7))) {
        isNight = true;
        body.classList.add('night-mode');
      } else {
        isNight = false;
        body.classList.remove('night-mode');
      }

      // 2. 表示内容更新
      body.classList.remove('alert-gohan', 'alert-ofuro');
      if (data.mode === 'ごはん') {
        body.classList.add('alert-gohan');
        msg.innerText = "ごはんです";
      } else if (data.mode === 'お風呂') {
        body.classList.add('alert-ofuro');
        msg.innerText = "お風呂です";
      } else {
        msg.innerText = data.mode || "おしらせはありません";
        dateArea.innerText = data.date || "";
      }
      
      // 音声読み上げ（夜間以外）
      if (!isNight && data.mode !== "通常") say(msg.innerText);
    });

    function say(text) {
      window.speechSynthesis.cancel();
      const uttr = new SpeechSynthesisUtterance(text);
      uttr.lang = "ja-JP";
      window.speechSynthesis.speak(uttr);
    }

    // カメラ機能（簡易版：親機からのリクエストを待つ）
    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        document.getElementById('localVideo').srcObject = stream;
        console.log("Camera Ready");
      } catch (e) { console.error("Camera Error", e); }
    }
  </script>
</body>
</html>
