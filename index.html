<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>インフォメーションパネル</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { 
      margin: 0; background-color: #eaddca; color: #3e2723; 
      font-family: "Hiragino Kaku Gothic ProN", sans-serif; 
      transition: 0.5s; overflow: hidden; touch-action: manipulation;
    }
    /* 開始ボタン */
    #start-button {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #4e342e; color: white; display: flex;
      justify-content: center; align-items: center; z-index: 10000; border: none; font-size: 5vw;
    }

    #main-wrapper {
      display: flex; width: 100vw; height: 100vh; padding: 25px; box-sizing: border-box;
    }

    /* 左側：メイン表示（通常は時計、通知時は「ごはん」「お風呂」） */
    #left-panel {
      flex: 1.3; background: rgba(255,255,255,0.4); border-radius: 50px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      margin-right: 25px; border: 2px solid rgba(255,255,255,0.5);
      transition: background-color 0.5s, color 0.5s;
    }
    #main-display { font-size: 16vw; font-weight: 900; text-align: center; line-height: 1.1; white-space: pre-wrap; }
    #sub-date { font-size: 5.5vw; font-weight: bold; margin-top: 25px; color: #795548; }

    /* 右側：通知履歴エリア */
    #right-panel {
      flex: 1; display: flex; flex-direction: column;
    }
    #history-title { font-size: 4.5vw; font-weight: 900; margin-bottom: 15px; padding-left: 10px; }
    
    .history-card {
      background: rgba(255,255,255,0.8); border-radius: 30px; margin-bottom: 15px;
      padding: 10px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px solid #d7ccc8;
      text-align: center; font-weight: bold; overflow: hidden;
    }
    
    /* 履歴のサイズ調整（資料準拠） */
    #hist-0 { flex: 1.2; font-size: 4.5vw; background: #fff; } /* 最新 */
    #hist-1 { flex: 1.0; font-size: 3.5vw; opacity: 0.8; }      /* 2個前 */
    #hist-2 { flex: 0.8; font-size: 2.5vw; opacity: 0.6; }      /* 3個前 */

    /* 特別な状態のスタイル */
    .gohan-mode #left-panel { background-color: #fff0f0; border-color: #ffab91; color: #d84315; }
    .ofuro-mode #left-panel { background-color: #f0f4ff; border-color: #82b1ff; color: #1976d2; }
    
    .night-mode { background: #000 !important; }
    .night-mode #main-wrapper { display: none; }

    #localVideo { position: fixed; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <button id="start-button" onclick="userActive()">画面をタップして開始</button>

  <div id="main-wrapper">
    <div id="left-panel">
      <div id="main-display">00:00</div>
      <div id="sub-date">--月--日 (曜)</div>
    </div>

    <div id="right-panel">
      <div id="history-title">通知</div>
      <div id="hist-0" class="history-card">通知はありません</div>
      <div id="hist-1" class="history-card">-</div>
      <div id="hist-2" class="history-card">-</div>
    </div>
  </div>

  <video id="localVideo" autoplay playsinline muted></video>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAP10nWUJqwlv-9yNtbMB6iBsawb44wn2A",
      databaseURL: "https://info-pane-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "info-pane"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    var db = firebase.database();
    var isReady = false;
    var lastMode = "";
    var msgHistory = ["(なし)", "(なし)", "(なし)"];

    function updateClock() {
      var now = new Date();
      var dayList = ["日", "月", "火", "水", "木", "金", "土"];
      var dateStr = (now.getMonth() + 1) + "月" + now.getDate() + "日 (" + dayList[now.getDay()] + ")";
      var timeStr = ("0" + now.getHours()).slice(-2) + ":" + ("0" + now.getMinutes()).slice(-2);
      
      document.getElementById('sub-date').innerText = dateStr;
      
      // ごはん・お風呂以外の時だけ時計を表示
      if (lastMode !== "ごはん" && lastMode !== "お風呂") {
        document.getElementById('main-display').innerText = timeStr;
      }
    }
    setInterval(updateClock, 1000);

    function say(txt) {
      if (!isReady || !txt) return;
      window.speechSynthesis.cancel();
      var uttr = new SpeechSynthesisUtterance(txt);
      uttr.lang = "ja-JP"; uttr.rate = 0.9;
      window.speechSynthesis.speak(uttr);
    }

    function updateHistoryUI() {
      document.getElementById('hist-0').innerText = msgHistory[0];
      document.getElementById('hist-1').innerText = msgHistory[1];
      document.getElementById('hist-2').innerText = msgHistory[2];
    }

    db.ref('currentStatus').on('value', function(snap) {
      var data = snap.val();
      if (!data) return;
      var mode = data.mode || "通常";
      var body = document.body;
      var mainDisp = document.getElementById('main-display');

      // 夜間モード判定
      var h = new Date().getHours();
      if (data.nightMode == 1 || (data.nightMode == 0 && (h >= 21 || h < 7))) {
        body.classList.add('night-mode');
      } else {
        body.classList.remove('night-mode');
      }

      // 画面状態のリセット
      body.classList.remove('gohan-mode', 'ofuro-mode');

      if (mode === "ごはん") {
        body.classList.add('gohan-mode');
        mainDisp.innerText = "ごはん\nです";
      } else if (mode === "お風呂") {
        body.classList.add('ofuro-mode');
        mainDisp.innerText = "お風呂\nです";
      }

      // 新しい通知（履歴更新と読み上げ）
      if (mode !== "通常" && mode !== lastMode) {
        msgHistory.unshift(mode);
        msgHistory = msgHistory.slice(0, 3);
        updateHistoryUI();
        say(mode === "ごはん" ? "ごはんです" : (mode === "お風呂" ? "お風呂です" : mode));
      }
      
      lastMode = mode;
      updateClock();
    });

    // カメラ機能
    db.ref('cameraControl').on('value', function(snap) {
      if (snap.val() === 'ON') startCamera(); else stopCamera();
    });
    var localStream = null;
    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
        localStream = stream;
        document.getElementById('localVideo').srcObject = stream;
        var canvas = document.createElement('canvas');
        setInterval(() => {
          if (!localStream) return;
          canvas.width = 320; canvas.height = 240;
          canvas.getContext('2d').drawImage(document.getElementById('localVideo'), 0,0,320,240);
          db.ref('cameraData').set({ image: canvas.toDataURL('image/jpeg', 0.5) });
        }, 1000);
      });
    }
    function stopCamera() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }

    function userActive() {
      isReady = true;
      document.getElementById('start-button').style.display = 'none';
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();
      say("準備完了。");
    }
  </script>
</body>
</html>
